version: '3.8'

services:
  db:
    image: mysql:8
    container_name: shortlink_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASS}
      MYSQL_DATABASE: ${DB_NAME}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASS}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - shortlink-network

  frontend:
    build: ./frontend
    expose:
      - "3000"
    networks:
      - shortlink-network
    restart: always

  backend:
    build: ./backend
    expose:
      - "5000"
    environment:
      - DB_HOST=db 
    networks:
      - shortlink-network
    depends_on:
      db:
        condition: service_healthy 
    restart: always

  nginx:
    image: nginx:alpine
    container_name: nginx_proxy
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - shortlink-network
    depends_on:
      - frontend
      - backend
    restart: always

  ngrok:
    image: ngrok/ngrok:latest
    container_name: ngrok_tunnel
    restart: always
    environment:
      - NGROK_AUTHTOKEN=3E4Bdftk5IBDRcYUvIaMBxBd54g_2NY8yBXoKBJrHkG2Tgtuk
    command:
      - "http"
      - "nginx:80"
    networks:
      - shortlink-network
    depends_on:
      - nginx

networks:
  shortlink-network:
    driver: bridge

volumes:
  db_data: